    <circle cx="288" cy="298" r="85" fill="none" stroke="#c8cdd6" stroke-width="1.5"/>
    <text x="282" y="332" font-family="Georgia,'Times New Roman',serif" font-size="96" font-weight="700" fill="#1e2c3c" text-anchor="middle">P</text>
    <text x="326" y="262" font-family="Georgia,'Times New Roman',serif" font-size="44" font-weight="600" fill="#2a4060" text-anchor="middle">S</text>
