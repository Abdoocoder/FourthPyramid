  <line x1="240" y1="626" x2="600" y2="626" stroke="#7a8898" stroke-width="0.8" opacity="0.45"/>
  <text x="420" y="716" font-family="'Palatino Linotype','Palatino','Book Antiqua',Georgia,serif" font-size="72" font-weight="400" fill="url(#fppi)" text-anchor="middle" letter-spacing="6" font-style="italic">F.P.P.I</text>
