  <text x="420" y="558" font-family="'Arial','Tahoma',sans-serif" font-size="25" font-weight="400" fill="#1a2535" text-anchor="middle" direction="rtl">شركـــة الهرم الرابع للصناعات البلاستيكية</text>
  <line x1="190" y1="576" x2="650" y2="576" stroke="#7a8898" stroke-width="0.8" opacity="0.55"/>
